<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - Пассажирам.РФ</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
</head>
<body class="auth-page">

    <header class="header">
        <div class="header-inner">
            <div class="logo">
                <span>Пассажирам.РФ</span>
            </div>
            <nav class="nav-links">
                <a href="../../index.html">Вход</a>
                <a href="register.html" class="active">Регистрация</a>
            </nav>
        </div>
    </header>

    <main class="auth-center">
        <div class="auth-card animate-fade-in">
            <div class="auth-illustration">
                <img src="/assets/img/2.png" alt="Register" class="auth-image">
                <div class="auth-overlay"></div>
                <div class="auth-badge">
                    <span>Присоединяйтесь!</span>
                </div>
            </div>

            <div class="auth-body">
                <div class="auth-header">
                    <h1>Создать аккаунт</h1>
                    <p class="text-muted">Начните обучение прямо сейчас</p>
                </div>

                <form id="register-form" onsubmit="event.preventDefault(); registerUser();">
                    <div class="form-group">
                        <label for="reg-fullname">ФИО</label>
                        <input type="text" id="reg-fullname" class="form-control" placeholder="Иванов Иван Иванович" required>
                    </div>

                    <div class="form-group">
                        <label for="reg-username">Логин</label>
                        <input type="text" id="reg-username" class="form-control" placeholder="Придумайте логин" required>
                        <span id="reg-user-error" class="error-text hidden"></span>
                    </div>

                    <div class="form-group">
                        <label for="reg-password">Пароль</label>
                        <div class="password-input">
                            <input type="password" id="reg-password" class="form-control" placeholder="Минимум 6 символов" required>
                            <button type="button" class="toggle-password" onclick="togglePassword('reg-password', this)">
                                👁
                            </button>
                        </div>
                        <span id="reg-pass-error" class="error-text hidden"></span>
                    </div>

                    <div class="form-group">
                        <label for="reg-password2">Повторите пароль</label>
                        <input type="password" id="reg-password2" class="form-control" placeholder="Повторите пароль" required>
                        <span id="reg-pass2-error" class="error-text hidden"></span>
                    </div>

                    <button type="submit" class="btn btn-block btn-primary animate-pulse-hover">
                        Зарегистрироваться
                    </button>
                </form>

                <div class="auth-divider">
                    <span>или</span>
                </div>

                <a href="../../index.html" class="btn btn-block btn-outline animate-pulse-hover">
                    Уже есть аккаунт
                </a>
            </div>
        </div>
    </main>

    <div class="modal-overlay" id="modal-overlay" onclick="closeModalOutside(event)">
        <div class="modal" style="position:relative;">
            <button class="modal-close" onclick="closeModal()">✕</button>
            <div class="modal-top-bar" id="modal-bar"></div>
            <div class="modal-body">
                <div class="modal-title" id="modal-title"></div>
                <div class="modal-text" id="modal-text"></div>
                <div class="modal-actions" id="modal-actions"></div>
            </div>
        </div>
    </div>

    <script src="../script.js"></script>
</body>
</html>
